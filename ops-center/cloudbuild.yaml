# Cloud Build config for the GUARDIAN Operations Center frontend.
# Builds the Next.js Dockerfile with NEXT_PUBLIC_* env vars baked in
# at build time (Next.js requires this for client-side env exposure).

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'ops-center/Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/guardian-ops-center:${COMMIT_SHA}'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/guardian-ops-center:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_ORCHESTRATOR_URL=${_ORCHESTRATOR_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_MAPBOX_TOKEN=${_MAPBOX_TOKEN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}'
      - 'ops-center/'

substitutions:
  _ORCHESTRATOR_URL: 'https://guardian-180171737110.us-central1.run.app'
  _MAPBOX_TOKEN: ''
  _FIREBASE_API_KEY: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''
  _FIREBASE_APP_ID: ''

images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/guardian-ops-center:${COMMIT_SHA}'
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/guardian-ops-center:latest'

options:
  logging: CLOUD_LOGGING_ONLY
