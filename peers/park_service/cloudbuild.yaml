# Cloud Build config for the Park Service A2A peer. Builds the peer's
# Dockerfile from the repo root so the build context can copy ./peers and
# ./pyproject.toml. Pushed to Artifact Registry.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'peers/park_service/Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/guardian-park-service:${COMMIT_SHA}'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/guardian-park-service:latest'
      - '--build-arg'
      - 'COMMIT_SHA=${COMMIT_SHA}'
      - '--build-arg'
      - 'AGENT_VERSION=0.1.0'
      - '.'

images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/guardian-park-service:${COMMIT_SHA}'
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/guardian-park-service:latest'

options:
  logging: CLOUD_LOGGING_ONLY
